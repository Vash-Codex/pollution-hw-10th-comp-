<p>
Water pollution is caused by harmful substances entering rivers, lakes and oceans.
</p>

<h2><font color="#1B4332">Sources</font></h2>

<ul>
<li>Sewage</li>
<li>Industrial waste</li>
<li>Plastic waste</li>
</ul>

<h2><font color="#1B4332">Effects</font></h2>

<ul>
<li>Death of aquatic organisms</li>
<li>Unsafe drinking water</li>
<li>Spread of diseases</li>
</ul>
