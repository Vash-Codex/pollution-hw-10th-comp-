<p>
Air pollution occurs when harmful gases, smoke and dust enter the atmosphere.
</p>

<h2><font color="#1B4332">Causes</font></h2>

<ul>
<li>Vehicle emissions</li>
<li>Industrial smoke</li>
<li>Burning fossil fuels</li>
</ul>

<h2><font color="#1B4332">Effects</font></h2>

<ul>
<li>Breathing problems</li>
<li>Global warming</li>
<li>Acid rain</li>
</ul>
